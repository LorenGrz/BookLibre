server:
  port: 8080
spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/booklibre?sslmode=disable
    username: booklibre
    password: booklibre
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://mongo:27017/booklibreMongo?wtimeoutMS=5000&socketTimeoutMS=5000&connectTimeoutMS=5000}
      database: booklibreMongo
    redis:
      host: redis
      port: 6379
  main:
    allow-bean-definition-overriding: true

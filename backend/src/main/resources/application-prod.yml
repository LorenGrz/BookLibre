# Perfil de produccion (Render). NO contiene credenciales.
server:
  # Render asigna el puerto por la variable PORT y la app DEBE escuchar en el.
  port: ${PORT:8080}

spring:
  datasource:
    # URL JDBC compuesta a partir de las propiedades de la base gestionada de Render, sslmode=require cifra el trafico.
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    mongodb:
      # String SRV de MongoDB Atlas (secret). Las migraciones Kotlin de db.migration
      # leen esta misma variable System.getenv("MONGODB_URI") para seedear Atlas.
      uri: ${MONGODB_URI}
      database: booklibreMongo
    redis:
      # Render Key Value (Valkey) expone una URL redis://:password@host:port.
      # Usamos spring.data.redis.url para que la password se respete.
      url: ${REDIS_URL}
  main:
    allow-bean-definition-overriding: true

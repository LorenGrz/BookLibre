springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

dgs:
  graphql:
    path: /api/graphql
    graphiql:
      path: /api/graphiql

server:
  error:
    whitelabel:
      enabled: false
    include-message: always

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  main:
    allow-bean-definition-overriding: true
  jpa:
    open-in-view: false

jwt:
  secret: ${JWT_SECRET:booklibre-clave-secreta-de-al-menos-32-caracteres-cambiar-en-produccion}
  expiration: ${JWT_EXPIRATION:900000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
